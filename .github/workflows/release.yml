name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true

      - name: Build bundled engine assets
        run: bundle exec rake changeset:build_assets

      - name: Prepare dummy database
        run: bundle exec bin/rails app:db:prepare

      - name: Run specs
        run: bundle exec rspec

      - name: Run static checks
        run: XDG_CACHE_HOME=/tmp bundle exec rubocop --no-server --cache false

      - name: Run Zeitwerk check
        run: bundle exec bin/rails app:zeitwerk:check

      - name: Build gem
        run: gem build changeset.gemspec

  release:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment: release

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true

      - name: Build bundled engine assets
        run: bundle exec rake changeset:build_assets

      - name: Publish gem with RubyGems Trusted Publishing
        uses: rubygems/release-gem@v1
